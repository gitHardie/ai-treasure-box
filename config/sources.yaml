global:
  retry_times: 3
  retry_delay: 15
  request_timeout: 30
  user_agent: AI-Treasure-Box/2.0
  rate_limit:
    requests_per_minute: 15
  collection:
    discovery_batch_size: 10
    health_check_interval_days: 3
    deep_update_day: 1
  analysis:
    mode: loop
    batch_size: 20
    batch_timeout: 120
    confidence_threshold: 0.7
  dedup:
    strategy: url+name
    similarity_threshold: 0.85
  categories:
  - 文本生成
  - 图像创作
  - 代码开发
  - 数据分析
  - 音视频
  - 办公效率
  - 学术研究
  - 开发工具
  - 设计创意
  - 营销推广
  - 教育培训
  - 其他
  audience_types:
  - general
  - developer
  - researcher
  inclusion:
    description: 收录规则：按分类设定最低实用性分数阈值(1-10)，低于阈值不收录
    rules:
      文本生成:
        min_utility: 1
        reason: 面向普通用户全收
      图像创作:
        min_utility: 1
        reason: 面向普通用户全收
      音视频:
        min_utility: 1
        reason: 面向普通用户全收
      办公效率:
        min_utility: 1
        reason: 面向普通用户全收
      设计创意:
        min_utility: 1
        reason: 面向普通用户全收
      营销推广:
        min_utility: 1
        reason: 面向普通用户全收
      教育培训:
        min_utility: 1
        reason: 面向普通用户全收
      数据分析:
        min_utility: 1
        reason: 受众较广全收
      代码开发:
        min_utility: 7
        reason: 筛掉纯SDK框架CI只收有产品形态的
      开发工具:
        min_utility: 6
        reason: 保留有产品形态的DevTool
      学术研究:
        min_utility: 5
        reason: 筛掉纯理论论文留有实用价值的
      AI Agent:
        min_utility: 3
        reason: Agent生态热门项目，适当收录
      金融科技:
        min_utility: 3
        reason: 垂直领域精选
      安全合规:
        min_utility: 3
        reason: AI安全日益重要
      生活服务:
        min_utility: 1
        reason: 面向普通用户全收
      其他:
        min_utility: 4
        reason: 需要有一定实用性才收
    global_min_utility: 4
    global_min_reason: 全局最低门槛：任何分类下utility<4都不收录（筛掉纯论文/纯基础设施）
