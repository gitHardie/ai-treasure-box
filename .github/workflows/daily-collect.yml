name: daily-collect

on:
  schedule:
    - cron: '0 18 * * *'
    - cron: '0 22 * * *'
    - cron: '0 */6 * * *'
  workflow_dispatch:
    inputs:
      source:
        description: '指定数据源ID'
        required: false
        type: string
      skip_analysis:
        description: '跳过AI分析'
        required: false
        type: boolean
        default: false

env:
  PYTHON_VERSION: '3.11'

jobs:
  collect:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
      - run: pip install -r requirements.txt
      - name: Run collection
        env:
          COZE_API_KEY: ${{ secrets.AI_BOX_COZE }}
          COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
        run: |
          SOURCE_ARG=""
          [ -n "${{ inputs.source }}" ] && SOURCE_ARG="--source ${{ inputs.source }}"
          cd scripts && python main.py collect $SOURCE_ARG || echo "Collection done with warnings"
      - name: Run AI analysis
        if: ${{ !inputs.skip_analysis }}
        env:
          COZE_API_KEY: ${{ secrets.AI_BOX_COZE }}
          COZE_WORKFLOW_ID: ${{ secrets.COZE_WORKFLOW_ID }}
        run: cd scripts && python main.py analyze || echo "Analysis done with warnings"
      - run: cd scripts && python main.py snapshot || echo "Snapshot done with warnings"
      - name: Commit data
        run: |
          git config user.name "AI Treasure Box Bot"
          git config user.email "bot@afterai.tech"
          git add data/
          git diff --cached --quiet || (git commit -m "📊 Data update: $(date -u +'%Y-%m-%d %H:%M UTC')" && git push)

  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build and deploy site
        run: |
          mkdir -p site/public/data
          cp -r data/* site/public/data/ 2>/dev/null || true
          cd site && npm install && npm run build
          cd dist
          git init
          git config user.name "AI Treasure Box Bot"
          git config user.email "bot@afterai.tech"
          git checkout -b gh-pages
          echo "afterai.tech" > CNAME
          cp index.html 404.html
          git add -A
          git commit -m "🚀 Deploy: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git push origin gh-pages --force
